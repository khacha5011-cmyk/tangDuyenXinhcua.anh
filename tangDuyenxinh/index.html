<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#ffb3c7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="image/anh.jpg" />
    <title>Quà sinh nhật bất ngờ cho em</title>
    <link
        href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="hearts-bg" id="hearts-bg" aria-hidden="true"></div>
    <div class="stage">
        <div class="iphone-wrap">
            <div class="btn-mute"></div>
            <div class="btn-vol-up"></div>
            <div class="btn-vol-dn"></div>
            <div class="btn-power"></div>
            <div class="phone" id="phone">
                <div class="notch">
                    <div class="notch-speaker"></div>
                    <div class="notch-cam"></div>
                </div>
                <div class="home-indicator"></div>
                <div class="status-bar">
                    <span class="sb-time" id="sb-time">9:41</span>
                    <div class="sb-right">
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                            <rect x="0" y="8" width="3" height="4" rx=".8" fill="#111" />
                            <rect x="4.5" y="5" width="3" height="7" rx=".8" fill="#111" />
                            <rect x="9" y="2" width="3" height="10" rx=".8" fill="#111" />
                            <rect x="13.5" y="0" width="2.5" height="12" rx=".8" fill="#111" opacity=".3" />
                        </svg>
                        <svg width="16" height="12" viewBox="0 0 20 14" fill="none">
                            <path d="M10 11.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" fill="#111" />
                            <path d="M5.6 8.6a6.3 6.3 0 018.8 0" stroke="#111" stroke-width="1.6" stroke-linecap="round"
                                fill="none" />
                            <path d="M2 5a11 11 0 0116 0" stroke="#111" stroke-width="1.6" stroke-linecap="round"
                                fill="none" opacity=".5" />
                        </svg>
                        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
                            <rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke="#111" stroke-opacity=".35" />
                            <rect x="1.5" y="1.5" width="17" height="9" rx="2.5" fill="#111" />
                            <path d="M23 4v4a2 2 0 000-4z" fill="#111" opacity=".4" />
                        </svg>
                    </div>
                </div>
                <div class="msn-bar">
                    <div class="msn-back">
                        <svg width="10" height="16" viewBox="0 0 10 18" fill="none">
                            <path d="M9 1L1 9l8 8" stroke="#ff4f85" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        <span class="msn-back-count">3</span>
                    </div>
                    <div class="msn-av-wrap">
                        <div class="msn-av">
                            <img class="avatar-img" src="image/anh.jpg" alt="Ảnh đại diện" />
                        </div>
                        <div class="msn-online"></div>
                    </div>
                    <div class="msn-info">
                        <div class="msn-name">Người yêu em</div>
                        <div class="msn-status">Đang hoạt động</div>
                    </div>
                    <div class="msn-acts">
                        <div class="act-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C9.6 21 3 14.4 3 6c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"
                                    fill="#ff4f85" />
                            </svg>
                        </div>
                        <div class="act-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M15 10l4.55-2.27A1 1 0 0121 8.68v6.64a1 1 0 01-1.45.9L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"
                                    stroke="#ff4f85" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                                    fill="none" />
                            </svg>
                        </div>
                        <div class="act-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="9" stroke="#ff4f85" stroke-width="1.8" fill="none" />
                                <path d="M12 8v.5M12 11v5" stroke="#ff4f85" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="messages" id="msgs"></div>
                <div class="input-bar">
                    <div class="ib-left">
                        <div class="ib-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="10" fill="#ff4f85" />
                                <path d="M12 7v10M7 12h10" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </div>
                        <div class="ib-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"
                                    stroke="#ff4f85" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
                                    fill="none" />
                                <circle cx="12" cy="13" r="4" stroke="#ff4f85" stroke-width="1.6" fill="none" />
                            </svg>
                        </div>
                        <div class="ib-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="3" width="18" height="18" rx="3" stroke="#ff4f85" stroke-width="1.6"
                                    fill="none" />
                                <circle cx="8.5" cy="8.5" r="1.5" fill="#ff4f85" />
                                <path d="M21 15l-5-5L5 21" stroke="#ff4f85" stroke-width="1.6" stroke-linecap="round"
                                    stroke-linejoin="round" fill="none" />
                            </svg>
                        </div>
                        <div class="ib-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <rect x="9" y="2" width="6" height="12" rx="3" stroke="#ff4f85" stroke-width="1.6"
                                    fill="none" />
                                <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6" stroke="#ff4f85" stroke-width="1.6"
                                    stroke-linecap="round" fill="none" />
                            </svg>
                        </div>
                    </div>
                    <div class="ib-field">Nhắn tin...</div>
                    <div class="ib-send">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 21s-6.7-4.35-9.2-8.1C1.1 10.3 2 6.8 5.1 5.3c2-.9 4.3-.4 5.9 1.2 1.6-1.6 3.9-2.1 5.9-1.2 3.1 1.5 4 5 2.3 7.6C18.7 16.65 12 21 12 21z"
                                fill="#ff4f85" />
                        </svg>
                    </div>
                </div>

                <div class="phone-overlay hold-gate" id="tap-gate">
                    <p class="hold-title">Cuộc gọi bất ngờ</p>
                    <p class="hold-sub">Chạm vào trái tim để nhận cuộc gọi</p>
                    <div class="heart-container" id="tap-heart" title="Like">
                        <input type="checkbox" class="checkbox" id="tap-like-toggle" aria-label="Like" />
                        <div class="svg-container">
                            <svg viewBox="0 0 24 24" class="svg-outline" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Zm-3.585,18.4a2.973,2.973,0,0,1-3.83,0C4.947,16.006,2,11.87,2,8.967a4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,11,8.967a1,1,0,0,0,2,0,4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,22,8.967C22,11.87,19.053,16.006,13.915,20.313Z"></path>
                            </svg>
                            <svg viewBox="0 0 24 24" class="svg-filled" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Z"></path>
                            </svg>
                            <svg class="svg-celebrate" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
                                <polygon points="10,10 20,20"></polygon>
                                <polygon points="10,50 20,50"></polygon>
                                <polygon points="20,80 30,70"></polygon>
                                <polygon points="90,10 80,20"></polygon>
                                <polygon points="90,50 80,50"></polygon>
                                <polygon points="80,80 70,70"></polygon>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="phone-overlay glitch-layer" id="glitch-layer" aria-hidden="true"></div>

                <div class="phone-overlay call-screen" id="call-screen">
                    <div class="call-top">Cuộc gọi FaceTime đến</div>
                    <div class="call-avatar-wrap">
                        <img class="call-avatar" src="image/anh.jpg" alt="Người gọi" />
                    </div>
                    <div class="call-name">Anh yêu của em</div>
                    <div class="call-sub">Đang gọi cho em...</div>
                    <div class="call-actions" id="call-actions">
                        <button class="call-btn decline" id="decline-btn" type="button">
                            <span>Hông nghe</span>
                        </button>
                        <button class="call-btn accept" id="accept-btn" type="button">
                            <span>Chấp nhận</span>
                        </button>
                    </div>
                    <div class="decline-hint" id="decline-hint"></div>
                </div>

                <div class="phone-overlay reveal-screen" id="reveal-screen">
                    <img class="reveal-image" id="reveal-image" src="image/anh6.jpg" alt="Kỷ niệm" />
                    <div class="reveal-overlay"></div>
                    <div class="reveal-text">
                        <p class="reveal-line" id="reveal-line">Mãi bên nhau em nhé ❤️</p>
                    </div>
                </div>
                <audio id="romance-audio" src="nhac.mp3" loop autoplay playsinline></audio>
            </div>
        </div>
    </div>

    <script src="cript.js"></script>
</body>

</html>
